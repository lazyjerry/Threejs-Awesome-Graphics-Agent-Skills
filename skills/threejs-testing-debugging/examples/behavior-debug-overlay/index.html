<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Behavior Debug Overlay</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #091018; color: #e8f2ff; font: 14px/1.4 system-ui; }
    canvas { display: block; }
    .panel { position: fixed; top: 16px; left: 16px; padding: 12px 14px; border: 1px solid #4d7088; border-radius: 8px; background: #08111ddd; pointer-events: none; }
    .state { color: #70f0b1; font-weight: 700; }
  </style>
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"}}
  </script>
</head>
<body>
  <main id="app" aria-label="Three.js behavior debug overlay"></main>
  <aside class="panel"><div>Agent A · <span class="state">patrol</span></div><div class="status">path, desired velocity, and perception visible</div></aside>
  <script type="module" src="./main.js"></script>
</body>
</html>
