<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Point Cloud Colormap</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #07111f; color: #edf6ff; font: 14px/1.4 system-ui; }
    canvas { display: block; }
    .legend { position: fixed; top: 16px; left: 16px; padding: 12px; background: #07111fe8; border: 1px solid #526b82; border-radius: 8px; }
    .ramp { width: 180px; height: 12px; background: linear-gradient(90deg, #2b4fff, #27d7a1, #ffe45c); }
  </style>
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"}}
  </script>
</head>
<body>
  <main id="app" aria-label="Point cloud showing scalar elevation"></main>
  <aside class="legend"><strong>Elevation</strong><div class="ramp"></div><div><span>−1 unit</span> · <span>+1 unit</span></div><p class="status">20,000 deterministic points</p></aside>
  <script type="module" src="./main.js"></script>
</body>
</html>
