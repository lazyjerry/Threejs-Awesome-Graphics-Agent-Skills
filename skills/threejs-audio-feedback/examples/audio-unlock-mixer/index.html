<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Audio Unlock and Mixer</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #120f1b; color: #fff; font: 16px/1.4 system-ui; }
    canvas { display: block; }
    .panel { position: fixed; top: 16px; left: 16px; padding: 14px; border-radius: 10px; background: #171124e8; }
    button, input { font: inherit; }
    button { padding: 9px 12px; }
    label { display: block; margin-top: 10px; }
  </style>
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"}}
  </script>
</head>
<body>
  <main id="app" aria-label="Three.js audio feedback scene"></main>
  <section class="panel">
    <button id="enable">Enable audio</button>
    <button id="play" disabled>Play feedback</button>
    <label>Master volume <input id="volume" type="range" min="0" max="1" step="0.05" value="0.35"></label>
    <p class="status" aria-live="polite">Audio locked.</p>
  </section>
  <script type="module" src="./main.js"></script>
</body>
</html>
