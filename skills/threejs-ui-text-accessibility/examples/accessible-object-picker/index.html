<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Accessible Object Picker</title>
  <style>
    * { box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { background: #111827; color: white; font: 16px/1.4 system-ui; }
    canvas { display: block; }
    .hud { position: fixed; inset: 16px auto auto 16px; width: min(300px, calc(100% - 32px)); padding: 14px; border-radius: 10px; background: #0b1220e8; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    button { padding: 9px 12px; border: 2px solid transparent; border-radius: 6px; background: #dbeafe; color: #10213b; }
    button:focus-visible { outline: 3px solid #fbbf24; outline-offset: 2px; }
    button[aria-pressed="true"] { border-color: #fbbf24; background: white; }
  </style>
  <script type="importmap">
    {"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js"}}
  </script>
</head>
<body>
  <main id="app" aria-label="Interactive 3D object view"></main>
  <section class="hud" aria-labelledby="picker-title">
    <strong id="picker-title">Select an object</strong>
    <div class="controls">
      <button data-id="red" aria-pressed="false">Red cube</button>
      <button data-id="green" aria-pressed="false">Green sphere</button>
      <button data-id="blue" aria-pressed="false">Blue cone</button>
    </div>
    <p id="selection" class="status" aria-live="polite">Nothing selected.</p>
  </section>
  <script type="module" src="./main.js"></script>
</body>
</html>
